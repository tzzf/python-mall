services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mall_network

  redis:
    image: redis:7
    restart: always
    command: redis-server --requirepass redispassword
    volumes:
      - redis_data:/data
    networks:
      - mall_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:apppassword@postgres:5432/appdb
      REDIS_URL: redis://default:redispassword@redis:6379/0
      SECRET_KEY: prod-secret-key-change-me
    depends_on:
      - postgres
      - redis
    networks:
      - mall_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - mall_network

  mall:
    build:
      context: ./mall
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - mall_network

networks:
  mall_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
